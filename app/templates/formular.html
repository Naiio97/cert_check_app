{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h1>{% if certifikat %}Upravit{% else %}Přidat{% endif %} certifikát</h1>

    <div class="toolbar" style="display: flex; justify-content: flex-end;">
        <a href="{{ url_for('main.index') }}" class="button info">
            <i class="fas fa-arrow-left"></i>
            Zpět na přehled
        </a>
    </div>

    <form method="POST"
        action="{% if certifikat %}/evidence_certifikatu/upravit/{{ certifikat.id }}{% else %}/evidence_certifikatu/pridat{% endif %}"
        class="form">
        <div class="form-group">
            <label for="server">Server:</label>
            <select name="server" id="server" required>
                {% for server in servery %}
                <option value="{{ server.nazev }}" {% if request.method=='POST' and request.form.server==server.nazev
                    %}selected {% elif not request.method=='POST' and certifikat and certifikat.server==server.nazev
                    %}selected{% endif %}>
                    {{ server.nazev }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="cesta">Cesta:</label>
            <input type="text" id="cesta" name="cesta"
                value="{{ request.form.cesta if request.method == 'POST' else (certifikat.cesta if certifikat else '') }}"
                required>
        </div>

        <div class="form-group">
            <label for="nazev">Název certifikátu:</label>
            <input type="text" id="nazev" name="nazev"
                value="{{ request.form.nazev if request.method == 'POST' else (certifikat.nazev if certifikat else '') }}"
                required>
        </div>

        <div class="form-group">
            <label for="expirace">Expirace:</label>
            <input type="text" id="expirace" name="expirace"
                value="{{ request.form.expirace if request.method == 'POST' else (certifikat.expirace.strftime('%d.%m.%Y') if certifikat else '') }}"
                placeholder="dd.mm.yyyy" required class="{% if error_field == 'expirace' %}is-invalid{% endif %}">
        </div>

        <div class="form-group">
            <label for="poznamka">Poznámka:</label>
            <textarea id="poznamka"
                name="poznamka">{{ request.form.poznamka if request.method == 'POST' else (certifikat.poznamka if certifikat else '') }}</textarea>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('main.index') }}" class="button secondary">Zrušit</a>
            <button type="submit" class="button primary">
                {{ 'Upravit' if certifikat else 'Přidat' }}
            </button>
        </div>
    </form>
</div>
{% endblock %}
